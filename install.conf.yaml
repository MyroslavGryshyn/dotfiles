- defaults:
    link:
      relink: true
      create: true
- clean: [$HOME]
- shell:
    - mkdir -p $HOME/.config/nvim
    - rm $HOME/.bashrc
    - rm $HOME/.zshrc
- link:
    $HOME/.zshrc: zshrc
    $HOME/.bashrc: bashrc
    $HOME/.bash_aliases: bash_aliases
    $HOME/.config/nvim/init.vim: nvimrc
    $HOME/.gitconfig: gitconfig
    $HOME/.gitignore_global: gitignore_global
    $HOME/.agignore: agignore
    $HOME/.isort.cfg: isort.cfg
