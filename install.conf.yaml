- defaults:
    link:
      relink: true
      create: true
- clean: ['~']
- shell:
    - mkdir -p $HOME/.config/nvim
- link:
    ~/.zshrc: zshrc
    ~/.tmux.conf: tmux.conf
    ~/.tmux_airline: tmux_airline
    ~/.bashrc: bashrc
    ~/.bash_aliases: bash_aliases
    ~/.config/nvim/init.vim: nvimrc
    ~/init.vim: nvimrc
    ~/.gitconfig: gitconfig
    ~/.gitignore_global: gitignore_global
    ~/.agignore: agignore
